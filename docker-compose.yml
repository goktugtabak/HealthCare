services:
  db:
    image: postgres:15-alpine
    container_name: healthai-db
    environment:
      POSTGRES_USER: healthai_user
      POSTGRES_PASSWORD: healthai_password
      POSTGRES_DB: healthai_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthai_user -d healthai_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: healthai-api
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://healthai_user:healthai_password@db:5432/healthai_db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@healthai.app}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-HEALTH AI}
        VITE_USE_MOCK_DATA: ${VITE_USE_MOCK_DATA:-true}
    container_name: healthai-app
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  frontend-dev:
    image: node:20-alpine
    container_name: healthai-app-dev
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
      VITE_APP_NAME: ${VITE_APP_NAME:-HEALTH AI}
      VITE_USE_MOCK_DATA: ${VITE_USE_MOCK_DATA:-true}
      CHOKIDAR_USEPOLLING: "true"
    profiles: ["dev"]
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
