services:
  db:
    image: postgres:15-alpine
    container_name: healthai-db
    environment:
      POSTGRES_USER: healthai_user
      POSTGRES_PASSWORD: healthai_password
      POSTGRES_DB: healthai_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthai_user -d healthai_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: healthai-api
    expose:
      - "5001"
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://healthai_user:healthai_password@db:5432/healthai_db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be exported (32+ chars). Generate one with: openssl rand -hex 48}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost,http://localhost:8080}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@healthai.app}
      ALLOW_UNVERIFIED: ${ALLOW_UNVERIFIED:-false}
      DELETION_TTL_MS: ${DELETION_TTL_MS:-259200000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-HEALTH AI}
        VITE_USE_MOCK_DATA: ${VITE_USE_MOCK_DATA:-false}
    container_name: healthai-app
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: healthai-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@healthai.local}
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  frontend-dev:
    image: node:20-alpine
    container_name: healthai-app-dev
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
      VITE_APP_NAME: ${VITE_APP_NAME:-HEALTH AI}
      VITE_USE_MOCK_DATA: ${VITE_USE_MOCK_DATA:-false}
      CHOKIDAR_USEPOLLING: "true"
    profiles: ["dev"]
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
  caddy_data:
  caddy_config:
